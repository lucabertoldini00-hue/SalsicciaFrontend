<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace - Modifica Ordine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <button class="attivo"><span id="button-text">SAKE</span></button>
            <button><span id="button-text"></span> FRUTTATI INVEC.</button>
            <button> JUNMAI</button>
        </nav>
        <header>
            <h1>MODIFICA ORDINE</h1>
        </header>
        <section class="modifica-section">
            <table class="modifica-table">
                <thead>
                    <tr>
                        <th class="intestazione-tabella-descrizione">DESCRIZIONE</th>
                        <th class="intestazione-tabella-quantita">Q.TÀ</th>
                        <th class="intestazione-tabella-prezzo">COSTO UNITARIO</th>
                        <th class="intestazione-tabella-azioni">AZIONI</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="cella-tabella-descrizione">DEGUSTAZIONE 1 SAKE</td>
                        <td class="cella-tabella-quantita">
                            <div class="contenitore-qta">
                                <button class="bottone-qta bottone-qta-meno">−</button>
                                <input type="text" class="input-qta" value="1" readonly>
                                <button class="bottone-qta bottone-qta-piu">+</button>
                            </div>
                        </td>
                        <td class="cella-tabella-prezzo">€ 3,00</td>
                        <td class="cella-tabella-azioni">
                            <button class="action-btn action-check">✓</button>
                            <button class="action-btn action-delete">✕</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
        <div class="footer">
            <button id="annulla-btn"><span id="annullaOrdine-sign">🗑️️ ANNULLA ORDINE</span></button>
            <button id="continua-btn" onclick="location.href='index.html'"><span id="continua-sign">🛒 CONTINUA ORDINE</span></button>
            <button id="stampa-btn"><span id="stampa-sign">🖨️ STAMPA</span></button>
        </div>
    </main>
    <aside>
        <header>
            <h2>RIEPILOGO ORDINE</h2>
            <div class="order-summary-box">
                <div class="order-number">ORDINE #246</div>
                <div class="order-total">
                    <h3>TOTALE DA PAGARE</h3>
                    <h1 class="item-cost">€ 12,00</h1>
                </div>
            </div>
            <div class="aside-actions">
                <button class="aside-btn">🖊️ Modifica Ordine</button>
                <button class="aside-btn">⚙️ Opzioni</button>
            </div>
        </header>
        <section>
            <h3>RIEPILOGO PRODOTTI</h3>
            <ul class="cart-list">
                <li>
                    <div class="cart-item">
                        <span class="item-qty">1</span>
                        <span class="item-desc">SAKE PREMIUM JUNMAI</span>
                        <span class="item-cost">€ 3,00</span>
                    </div>
                    <div class="cart-item">
                        <span class="item-qty">1</span>
                        <span class="item-desc">SAKE PREMIUM JUNMAI</span>
                        <span class="item-cost">€ 3,00</span>
                    </div>
                    <div class="cart-item">
                        <span class="item-qty">1</span>
                        <span class="item-desc">SAKE PREMIUM JUNMAI</span>
                        <span class="item-cost">€ 3,00</span>
                    </div>
                    <div class="cart-item">
                        <span class="item-qty">1</span>
                        <span class="item-desc">SAKE PREMIUM JUNMAI</span>
                        <span class="item-cost">€ 3,00</span>
                    </div>
                </li>
            </ul>
        </section>
    </aside>

    <script>
        document.querySelector('.bottone-qta-meno').addEventListener('click', function() {
            var input = document.querySelector('.input-qta');
            var val = parseInt(input.value) || 0;
            if (val > 1) {
                input.value = val - 1;
            }
        });
        document.querySelector('.bottone-qta-piu').addEventListener('click', function() {
            var input = document.querySelector('.input-qta');
            var val = parseInt(input.value) || 0;
            input.value = val + 1;
        });
    </script>
</body>
</html>
